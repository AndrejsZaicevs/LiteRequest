<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <!-- Dark App Base Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#262626" />
      <stop offset="100%" stop-color="#121212" />
    </linearGradient>
    
    <!-- Top-facing Wing (Lighter) -->
    <linearGradient id="plane-light" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" /> <!-- Tailwind Blue 500 -->
      <stop offset="100%" stop-color="#93c5fd" /> <!-- Tailwind Blue 300 -->
    </linearGradient>

    <!-- Bottom-facing Wing (Darker) -->
    <linearGradient id="plane-dark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8" /> <!-- Tailwind Blue 700 -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- Tailwind Blue 500 -->
    </linearGradient>
    
    <!-- General Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- App Icon Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Base Squircle -->
  <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#bg)" filter="url(#shadow)" />
  
  <!-- Subtle Glassmorphism Edge Highlights -->
  <rect x="17" y="17" width="222" height="222" rx="51" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.08" />
  <rect x="15" y="15" width="226" height="226" rx="53" fill="none" stroke="#000000" stroke-width="2" stroke-opacity="0.3" />

  <!-- Background Tech/Developer Details -->
  <!-- Inner Ring -->
  <circle cx="128" cy="128" r="64" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 8" stroke-opacity="0.15" />
  <!-- Outer Ring -->
  <circle cx="128" cy="128" r="96" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2 12" stroke-opacity="0.08" />
  
  <!-- Background Developer Brackets (HUD effect) -->
  <g fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.15">
    <path d="M 64 104 L 40 128 L 64 152" />
    <path d="M 192 104 L 216 128 L 192 152" />
  </g>

  <!-- The Main Icon Group -->
  <g filter="url(#glow)">
    <!-- Exhaust / Trail Particles (Speed & "Lite" concept) -->
    <path d="M 88 184 L 96 176 L 100 188 Z" fill="#3b82f6" opacity="0.6" />
    <path d="M 64 204 L 70 198 L 74 208 Z" fill="#3b82f6" opacity="0.3" />
    <circle cx="106" cy="192" r="2" fill="#60a5fa" opacity="0.7" />
    
    <!-- Left/Top Wing -->
    <path d="M 64 136 L 184 64 L 116 152 Z" fill="url(#plane-light)" />
    
    <!-- Right/Bottom Wing -->
    <path d="M 184 64 L 144 196 L 116 152 Z" fill="url(#plane-dark)" />
    
    <!-- Center Fold Highlight (Enhances 3D depth) -->
    <path d="M 184 64 L 116 152 L 120 151 Z" fill="#ffffff" opacity="0.6" />
  </g>
</svg>